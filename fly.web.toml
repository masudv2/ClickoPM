app = "clickopm-web"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.web"

  [build.args]
    REMOTE_API_URL = "http://clickopm-backend.internal:8080"
    NEXT_PUBLIC_WS_URL = "wss://clickopm-web.fly.dev/ws"

[env]
  NODE_ENV = "production"
  REMOTE_API_URL = "http://clickopm-backend.internal:8080"
  HOSTNAME = "0.0.0.0"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
