app = "clickopm-backend"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  PORT = "8080"
  ALLOW_SIGNUP = "true"
  LOCAL_UPLOAD_DIR = "/data/uploads"
  LOCAL_UPLOAD_BASE_URL = "/uploads"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[mounts]
  source = "clickopm_uploads"
  destination = "/data/uploads"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
